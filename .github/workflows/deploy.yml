name: CI/CD Build and Deploy (Even Tags Only)

on:
  push:
    tags:
      - 'v*.*.0' # Срабатывает только на релизные теги (оканчивающиеся на .0, например v0.5.0, v1.2.0). Хотфиксы (v0.5.1) игнорируются.

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ghcr.io/${{ github.repository }}-frontend
  MIGRATE_IMAGE_NAME: ghcr.io/${{ github.repository }}-migrate

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push Migrations Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/migrate
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.MIGRATE_IMAGE_NAME }}:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            mkdir -p ~/pharma-app
            cd ~/pharma-app
            
            # Генерация .env файла на сервере из секретов GitHub
            cat <<EOF > .env
            ENV=production
            PORT=${{ secrets.APP_PORT }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            OTP_HMAC_SECRET=${{ secrets.OTP_HMAC_SECRET }}
            UploadDir=./uploads
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            
            FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            
            DB_HOST=postgres
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            
            VALKEY_HOST=valkey
            VALKEY_PORT=${{ secrets.VALKEY_PORT }}
            
            SMTP_SERVER=${{ secrets.SMTP_SERVER }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EOF
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export APP_TAG=${{ github.ref_name }}
            docker compose pull
            docker compose --profile all up -d --remove-orphans
            docker image prune -f
