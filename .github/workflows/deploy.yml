name: CI/CD Build and Deploy (Even Tags Only)

on:
  push:
    tags:
      - "v*.*.0" # Срабатывает только на релизные теги (оканчивающиеся на .0, например v0.5.0, v1.2.0). Хотфиксы (v0.5.1) игнорируются.

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ghcr.io/artemchadaev/diplom-backend
  FRONTEND_IMAGE_NAME: ghcr.io/artemchadaev/diplom-frontend
  MIGRATE_IMAGE_NAME: ghcr.io/artemchadaev/diplom-migrate

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push Migrations Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/migrate
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.MIGRATE_IMAGE_NAME }}:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # 1. Скачиваем код из репозитория, чтобы получить доступ к docker-compose.yml
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Копируем файл docker-compose.yml на сервер по SSH
      - name: Copy docker-compose via scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "docker-compose.yml"
          target: "~/pharma-app"

      # 3. Подключаемся к серверу и запускаем контейнеры
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            mkdir -p ~/pharma-app
            cd ~/pharma-app

            # Записываем .env из одного секрета ENV_FILE
            printf '%s' '${{ secrets.ENV_FILE }}' > .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export APP_TAG=${{ github.ref_name }}
            docker compose pull
            docker compose --profile all up -d --remove-orphans
            docker image prune -f
